<!DOCTYPE html>
<html>
<head>
    <title>UPRESSease Login</title>
    <link rel="stylesheet" href="STUDENT_LOGIN_MAIN.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<section id="login" class="login-bg">

    <div class="login-card">
        <div class="login-icon">🎓</div>
        <h2>UPRESSease</h2>
        <p>
            Western Mindanao State University<br>
            Printing &amp; Merchandise Reservation System
            <br><br>
        </p>

        <form onsubmit="doLogin(event)">

            <label>Email</label><br>
            <input type="email" id="login-email" placeholder="student@wmsu.edu.ph" required>

            <br><br>

            <label>Password</label><br>
            <input type="password" id="login-password" placeholder="Enter password" required>

            <br><br>

            <button type="submit" class="btn-red full">Login</button>

            <p class="signup-text">
                Don't have an account?
                <a href="STUDENT_SIGNUP_MAIN.html">Sign up</a>
            </p>

        </form>
    </div>

</section>

<script>
    function doLogin(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        if (!localStorage.getItem('signed_name')) {
            localStorage.setItem('signed_name', email.split('@')[0]);
        }
        localStorage.setItem('signed_email', email);
        window.location.href = 'STUDENT_DASHBOARD_MAIN.html';
    }
</script>

</body>
</html>

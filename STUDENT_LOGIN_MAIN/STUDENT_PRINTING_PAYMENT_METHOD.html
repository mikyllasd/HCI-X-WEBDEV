<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Payment Method - UPRESSease</title>
    <link rel="stylesheet" href="STUDENT_PAYMENT_METHOD.css">
</head>
<body>

    <header class="appbar">
        <a href="STUDENT_PRINTING_PAYMENT.html" class="back-btn">←</a>
        <div class="appbar-titles">
            <span class="appbar-title">Select Payment Method</span>
            <span class="appbar-subtitle">Step 2 of 3</span>
        </div>
    </header>

    <main class="page">
        <div class="layout">

            <div class="col-left">
                <div class="card">
                    <div class="card-head">
                        <div class="card-title">Order Summary</div>
                        <div class="card-subtitle">1 service(s) in cart</div>
                    </div>
                    <div class="summary-service">
                        <div class="summary-service-row">
                            <span class="summary-service-label">Service</span>
                            <span class="summary-service-name" id="sum-service">—</span>
                        </div>
                        <div class="summary-service-desc" id="sum-desc">—</div>
                        <div class="summary-service-price" id="sum-price">₱0.00</div>
                    </div>
                    <hr class="divider">
                    <div class="summary-total-row">
                        <span class="summary-total-label">Total Amount</span>
                        <span class="summary-total-money" id="sum-total">₱0.00</span>
                    </div>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <div class="card-head">
                        <div class="card-title">Select Payment Method:</div>
                    </div>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="gcash" class="payment-radio">
                            <div class="payment-icon payment-icon--blue">💳</div>
                            <div class="payment-text">
                                <span class="payment-name">GCash</span>
                                <span class="payment-desc">Pay now via GCash</span>
                            </div>
                            <div class="payment-check">✓</div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cash" class="payment-radio">
                            <div class="payment-icon payment-icon--green">👛</div>
                            <div class="payment-text">
                                <span class="payment-name">Cash on Pick-up</span>
                                <span class="payment-desc">Pay when you pick up your order</span>
                            </div>
                            <div class="payment-check">✓</div>
                        </label>
                    </div>
                </div>
                <button class="btn-proceed" onclick="proceedPayment()">PROCEED</button>
            </div>

        </div>
    </main>

    <script>
        const order = JSON.parse(localStorage.getItem('printOrder') || '{}');
        document.getElementById('sum-service').textContent = order.service || '—';
        document.getElementById('sum-desc').textContent = order.desc || '—';
        document.getElementById('sum-price').textContent = '₱' + (order.total || '0.00');
        document.getElementById('sum-total').textContent = '₱' + (order.total || '0.00');

        function proceedPayment() {
            const selected = document.querySelector('input[name="payment"]:checked');
            if (!selected) {
                alert('Please select a payment method.');
                return;
            }
            localStorage.setItem('paymentMethod', selected.value);
            if (selected.value === 'gcash') {
                window.location.href = 'STUDENT_PRINTING_GCASH.html';
            } else {
                window.location.href = 'STUDENT_ORDER_CONFIRM.html';
            }
        }
    </script>

</body>
</html>

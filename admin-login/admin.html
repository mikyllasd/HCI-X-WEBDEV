<!DOCTYPE html>
<html>
<head>
    <title>UPRESSease Login</title>
    <link rel="stylesheet" href="admin.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<section id="login" class="login-bg">
    

    <div class="login-card">
        <div class="login-icon">🛡️</div>
        <h2>Admin Portal</h2>

        <p>
           UPRESSease Management System<br>
            Western Mindanao State University
            <br><br>
        </p>

        <!-- LOGIN FORM -->
        <form action="admin-dashboard.html">

            
            <label>Email</label><br>
            <input type="email" placeholder="admin@wmsu.edu.ph" required>

            <br><br>

            <label>Password</label><br>
            <input type="password" placeholder="Enter password" required>

            <br><br>


            <button class="btn-red btn-admin">Login as Admin</button>


        </form>

    </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Portal – UPRESSease</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin-login-entry-point.css"/>
</head>
<body>
  <div class="grain"></div>
 
  <div class="card">
    <div class="shield-wrap">
      <div class="shield">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1zm-1 14l-3-3 1.41-1.41L11 12.17l4.59-4.58L17 9l-6 6z"/>
        </svg>
      </div>
    </div>
 
    <h1 class="card-title">Admin Portal</h1>
    <p class="card-sub">UPRESSease Management System<br>Western Mindanao State University</p>
 
    <div class="alert" id="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      <span id="alert-msg"></span>
    </div>
 
    <div>
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="username" placeholder="Enter admin username" autocomplete="username"/>
      </div>
 
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
 
      <button class="btn-login" id="loginBtn" type="button">Login as Admin</button>
    </div>
 
    <div class="divider"><span></span><p>or access as</p><span></span></div>
    <a class="student-link" id="studentLink">Student Login</a>
 
    <!-- Demo Credentials -->
    <div class="demo-section">
      <p class="demo-label">Demo Credentials — click to auto-fill</p>
      <div class="demo-cards">
        <div class="demo-card" data-user="superadmin" data-pass="super123">
          <span class="fill-tag">Fill</span>
          <span class="role">Super Admin (Full Access)</span>
          <span class="cred-user">superadmin</span>
          <span class="cred-pass">super123</span>
        </div>
        <div class="demo-card" data-user="admin" data-pass="admin123">
          <span class="fill-tag">Fill</span>
          <span class="role">Admin (Limited Access)</span>
          <span class="cred-user">admin</span>
          <span class="cred-pass">admin123</span>
        </div>
        <div class="demo-card" data-user="staff" data-pass="staff123">
          <span class="fill-tag">Fill</span>
          <span class="role">Staff (Basic Access)</span>
          <span class="cred-user">staff</span>
          <span class="cred-pass">staff123</span>
        </div>
      </div>
    </div>
  </div>
 
  <script src="admin-login-entry-point.js"></script>
</body>
</html>

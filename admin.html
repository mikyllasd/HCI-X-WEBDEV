<!DOCTYPE html>
<html>
<head>
    <title>UPRESSease Login</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<section id="login" class="login-bg">
    

    <div class="login-card">
        <div class="login-icon">🎓</div>
        <h2>UPRESSease</h2>

        <p>
            Western Mindanao State University<br>
            Printing & Merchandise Reservation System
            <br><br>
        </p>

        <!-- LOGIN FORM -->
        <form action="dashboard.html">

            
            <label>Email</label><br>
            <input type="email" placeholder="admin@wmsu.edu.ph" required>

            <br><br>

            <label>Password</label><br>
            <input type="password" placeholder="Enter password" required>

            <br><br>


            <button class="btn-red btn-admin">Admin Login</button>

            <!-- SIGN UP LINK -->
            <p class="signup-text">
                Don't have an account?
                <a href="signup.html">Sign up</a>
            </p>


        </form>

    </div>

</section>

</body>
</html>

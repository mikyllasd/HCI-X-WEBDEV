<div class="sd-header">
  <h1 class="sd-title">Payment Verification</h1>
  <p class="sd-subtitle">Verify GCash payments and confirm transactions</p>
</div>

<div class="verification-form">
  <div class="verification-steps">
    <div class="verification-step active" id="step1">
      <div class="verification-step-icon">
        <i data-lucide="upload"></i>
      </div>
      <div class="verification-step-title">Upload Proof</div>
    </div>
    <div class="verification-step" id="step2">
      <div class="verification-step-icon">
        <i data-lucide="check-circle"></i>
      </div>
      <div class="verification-step-title">Verify Details</div>
    </div>
    <div class="verification-step" id="step3">
      <div class="verification-step-icon">
        <i data-lucide="thumbs-up"></i>
      </div>
      <div class="verification-step-title">Confirm Payment</div>
    </div>
  </div>

  <div class="verification-content">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Reference Number</label>
        <input
          type="text"
          class="form-input"
          id="refNumber"
          placeholder="Enter reference number"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Amount</label>
        <input
          type="number"
          class="form-input"
          id="amount"
          placeholder="0.00"
          step="0.01"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Proof of Payment</label>
      <div class="file-upload" id="fileUpload">
        <input
          type="file"
          id="proofFile"
          accept="image/*"
          style="display: none"
        />
        <div class="upload-area">
          <i data-lucide="upload"></i>
          <p>Click to upload proof of payment</p>
          <small>PNG, JPG up to 5MB</small>
        </div>
      </div>
      <div class="uploaded-file" id="uploadedFile" style="display: none">
        <img id="proofPreview" src="" alt="Proof of payment" />
        <button class="btn btn-secondary" onclick="removeFile()">Remove</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Customer Name</label>
      <input
        type="text"
        class="form-input"
        id="customerName"
        placeholder="Enter customer name"
      />
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea
        class="form-input form-textarea"
        id="notes"
        placeholder="Additional notes"
      ></textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      <button class="btn btn-primary" onclick="verifyPayment()">
        Verify Payment
      </button>
    </div>
  </div>
</div>

<div class="sd-panel">
  <div class="sd-panel__head">
    <div class="sd-panel__title">
      <i data-lucide="clock"></i>
      Pending Verifications
    </div>
  </div>

  <div class="pending-verifications" id="pendingVerifications">
    <div class="sd-empty">
      <div class="sd-empty__icon">
        <i data-lucide="clock"></i>
      </div>
      <h3 class="sd-empty__title">No pending verifications</h3>
      <p class="sd-empty__sub">
        Pending payment verifications will appear here
      </p>
    </div>
  </div>
</div>

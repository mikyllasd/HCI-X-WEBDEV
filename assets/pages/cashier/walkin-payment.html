<div class="sd-header">
  <h1 class="sd-title">Walk-in Payment</h1>
  <p class="sd-subtitle">Process cash payments for walk-in customers</p>
</div>

<div class="walkin-form">
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Customer Name</label>
      <input
        type="text"
        class="form-input"
        id="walkinCustomerName"
        placeholder="Enter customer name"
      />
    </div>
    <div class="form-group">
      <label class="form-label">Contact Number</label>
      <input
        type="tel"
        class="form-input"
        id="walkinContact"
        placeholder="Enter contact number"
      />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Service Type</label>
      <select class="form-input" id="walkinService">
        <option value="">Select service</option>
        <option value="printing">Printing</option>
        <option value="binding">Binding</option>
        <option value="lanyard">Lanyard</option>
        <option value="mug">Mug Printing</option>
        <option value="id-printing">ID Printing</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Amount</label>
      <input
        type="number"
        class="form-input"
        id="walkinAmount"
        placeholder="0.00"
        step="0.01"
      />
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Description</label>
    <textarea
      class="form-input form-textarea"
      id="walkinDescription"
      placeholder="Describe the service or items"
    ></textarea>
  </div>

  <div class="form-group">
    <label class="form-label">Cash Received</label>
    <input
      type="number"
      class="form-input"
      id="cashReceived"
      placeholder="0.00"
      step="0.01"
    />
  </div>

  <div class="payment-summary" id="paymentSummary" style="display: none">
    <div class="summary-row">
      <span>Total Amount:</span>
      <span id="summaryTotal">₱0.00</span>
    </div>
    <div class="summary-row">
      <span>Cash Received:</span>
      <span id="summaryReceived">₱0.00</span>
    </div>
    <div class="summary-row change-row">
      <span>Change:</span>
      <span id="summaryChange">₱0.00</span>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn btn-secondary" onclick="clearWalkinForm()">Clear</button>
    <button class="btn btn-primary" onclick="calculateChange()">
      Calculate Change
    </button>
    <button
      class="btn btn-primary"
      id="processWalkinBtn"
      onclick="processWalkinPayment()"
      disabled
    >
      Process Payment
    </button>
  </div>
</div>

<div class="sd-panel">
  <div class="sd-panel__head">
    <div class="sd-panel__title">
      <i data-lucide="receipt"></i>
      Today's Walk-in Transactions
    </div>
  </div>

  <div class="walkin-records" id="walkinRecords">
    <div class="sd-empty">
      <div class="sd-empty__icon">
        <i data-lucide="receipt"></i>
      </div>
      <h3 class="sd-empty__title">No walk-in transactions today</h3>
      <p class="sd-empty__sub">Walk-in payment records will appear here</p>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPRESSEase | Staff Login</title>
  <link rel="stylesheet" href="staff.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">
        <img src="logo.png" alt="UPRESSEase Logo" />
      </div>
      <h2>UPRESSEase</h2>
      <p>Western Mindanao State University<br>Printing & Merchandise Reservation System</p>
      <h3 class="role">Staff Login</h3>

      <form id="staffLoginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="staff@wmsu.edu.ph" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required />

        <button type="submit">Login</button>
      </form>

      <p class="footer-text">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="staff.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | Binding Details</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='binding.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">Your Details</span>
        <span class="appbar-subtitle">UPRESSease - WMSU</span>
    </div>
    <button class="appbar-action" onclick="window.location.href='cart.html'">🛒 Cart <span class="cart-badge"></span></button>
</header>
<main class="page">
    <div class="layout-half">
        <div class="col-left">
            <div class="card">
                <div class="card-head">
                    <div class="card-title">Your Details</div>
                    <div class="card-subtitle">Required for processing your order</div>
                </div>
                <div class="field"><label class="label">Full Name *</label><input class="input" type="text" id="binding-d-name" placeholder="Enter your full name" /></div>
                <div class="field"><label class="label">Phone Number *</label><input class="input" type="tel" id="binding-d-phone" placeholder="09xxxxxxxxx" /></div>
                <div class="grid-2">
                    <div class="field"><label class="label">Course and Year</label><input class="input" type="text" id="binding-d-course" placeholder="e.g. BSCS 3rd Year" /></div>
                    <div class="field"><label class="label">College</label><input class="input" type="text" id="binding-d-college" placeholder="Enter college" /></div>
                </div>
                <div class="field"><label class="label">Preferred Pick-up Date *</label><input class="input" type="date" id="binding-d-date" /></div>
            </div>
        </div>
        <div class="col-right">
            <div class="card card-sticky">
                <div class="card-head"><div class="card-title">Order Summary</div></div>
                <div class="summary">
                    <div class="summary-row"><span class="summary-label">Binding Type</span><span class="summary-value" id="binding-sum-type">—</span></div>
                    <div class="summary-row"><span class="summary-label">Qty</span><span class="summary-value" id="binding-sum-qty">—</span></div>
                    <div class="summary-row"><span class="summary-label">Price / copy</span><span class="summary-value" id="binding-sum-unit">₱0.00</span></div>
                    <hr class="divider" />
                    <div class="summary-row">
                        <span class="summary-label summary-total-label">Total</span>
                        <span class="summary-money" id="binding-sum-total">₱0.00</span>
                    </div>
                    <button class="btn-order" onclick="bindingOrderNow()">🛍 Order Now</button>
                    <button class="btn-cart" onclick="bindingAddToCart()">+ Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../../js/student/student.js"></script>
<script src="../../js/student/binding-details.js"></script>
</body>
</html>

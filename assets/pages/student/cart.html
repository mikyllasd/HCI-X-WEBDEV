<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | My Cart</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/cart.css" />
</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">My Cart</span>
        <span class="appbar-subtitle">UPRESSease - WMSU</span>
    </div>
</header>

<main class="page">
    <div class="cart-page-wrapper">
        <div class="cart-items-col">
            <div class="card">
                <div class="card-head" style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div class="card-title">🛒 Cart Items</div>
                        <div class="card-subtitle" id="cart-item-count">0 item(s)</div>
                    </div>
                    <!-- Select All Toolbar -->
                    <label class="cart-select-all-label" id="cart-select-all-wrap" style="display:none;">
                        <input type="checkbox" id="cart-select-all" onchange="cartSelectAll(this.checked)" />
                        <span>Select All</span>
                    </label>
                </div>
                <div id="cart-items-list">dsd</div>
                <div id="cart-empty-state" style="display:none;text-align:center;padding:2rem;">
                    <div style="font-size:3rem;margin-bottom:1rem;">🛒</div>
                    <h3 style="color:#777;margin-bottom:0.5rem;">Your cart is empty</h3>
                    <p style="color:#aaa;margin-bottom:1.5rem;">Add items from our services to get started</p>
                    <button class="btn-red" onclick="window.location.href='dashboard.html'" style="width:auto;padding:0.75rem 2rem;">Browse Services</button>
                </div>
            </div>
        </div>

        <div class="cart-summary-col">
            <div class="card card-sticky">
                <div class="card-head"><div class="card-title">Order Summary</div></div>
                <div class="summary">
                    <div class="summary-row">
                        <span class="summary-label">Selected Items</span>
                        <span class="summary-value" id="cart-sum-count">0</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Subtotal</span>
                        <span class="summary-value" id="cart-sum-subtotal">₱0.00</span>
                    </div>
                    <hr class="divider" />
                    <div class="summary-row">
                        <span class="summary-label summary-total-label">Total</span>
                        <span class="summary-money" id="cart-sum-total">₱0.00</span>
                    </div>
                    <button class="btn-order" id="cart-checkout-btn" onclick="cartProceedCheckout()">🛍 Proceed to Checkout</button>
                    <button class="btn-cart" onclick="cartClearAll()">🗑 Clear Cart</button>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Edit Quantity Modal -->
<div class="modal-overlay" id="edit-qty-modal" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            <span class="modal-title">Edit Quantity</span>
            <button class="modal-close" onclick="closeEditModal()">✕</button>
        </div>
        <div class="modal-body">
            <p class="modal-item-name" id="edit-modal-item-name"></p>
            <div class="qty-stepper">
                <button class="qty-step-btn" onclick="changeModalQty(-1)">−</button>
                <input type="number" class="qty-step-input" id="edit-modal-qty" min="1" max="999" value="1" />
                <button class="qty-step-btn" onclick="changeModalQty(1)">+</button>
            </div>
            <div class="modal-price-preview">
                Unit price: <strong id="edit-modal-unit-price">₱0.00</strong>
                &nbsp;→&nbsp; New total: <strong id="edit-modal-new-total">₱0.00</strong>
            </div>
        </div>
        <div class="modal-footer">
            <button class="modal-cancel-btn" onclick="closeEditModal()">Cancel</button>
            <button class="modal-save-btn" onclick="saveEditQty()">Save Changes</button>
        </div>
    </div>
</div>

<script src="../../js/student/student.js"></script>
<script src="../../js/student/cart.js"></script>
</body>
</html>

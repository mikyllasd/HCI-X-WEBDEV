<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){var k='upress-theme';var s=localStorage.getItem(k);var t=(s==='dark'||s==='light')?s:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>

    <title>UPRESSease | Order Confirmed</title>

    <!-- Main stylesheet for student pages -->
    <link rel="stylesheet" href="../../css/student/student.css" />
  <link rel="stylesheet" href="../../css/upress-theme-toggle.css" />

</head>
<body>

<!-- Top navigation bar with back button and page title -->
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">Order Confirmed</span>
        <span class="appbar-subtitle">UPRESSease - WMSU</span>
    </div>
</header>

<!-- Main content area -->
<main class="page">
    <div class="confirm-wrapper">
        <div class="confirm-card">

            <!-- Success icon and confirmation message -->
            <div class="confirm-icon">
                <span class="upress-icon upress-icon--check upress-icon--xl" aria-hidden="true"></span>
            </div>
            <h2>Order Submitted!</h2>
            <p id="confirm-message">
                Your order has been received and is now pending processing.
                We'll notify you when it's ready for pickup.
            </p>

            <!-- Container where order details will be inserted dynamically -->
            <div class="confirm-details" id="confirm-details-list"></div>

            <!-- Action buttons for navigation -->
            <div class="confirm-actions">
                <button type="button" class="btn-red" onclick="window.location.href='orders.html'">
                    View My Orders
                </button>
                <button type="button" class="btn-red btn-red--secondary" onclick="window.location.href='dashboard.html'">
                    Back to Dashboard
                </button>
            </div>

        </div>
    </div>
</main>

<!-- Script containing Orders data and helper functions like escHtml -->
<script src="../../js/student/student.js"></script>

<script>
/* Ensures script runs only after the page and external JS are fully loaded */
document.addEventListener("DOMContentLoaded", function () {

    /* Get all orders and select the most recent one */
    const all    = Orders.getAll();
    const latest = all[0];

    /* Update message based on order type */
    const messageEl = document.getElementById('confirm-message');
    if (latest && latest.order_type === 'organization') {
        messageEl.textContent = 'Your request is pending for review. You will receive a call shortly.';
    }

    /* Target container for displaying order details */
    const detailsEl = document.getElementById('confirm-details-list');

    if (latest && detailsEl) {
        const c = latest.customer || {};

        /* Prepare order details as label-value pairs */
        const rows = [
            ['Order ID',     latest.orderId       || '—'],
            ['Service',      latest.service       || '—'],
            ['Description',  latest.desc          || '—'],
            ['Total',        '₱' + (latest.total  || '0.00')],
            ['Payment',      latest.paymentMethod || '—'],
            ['Name',         c.name               || '—'],
            ['Contact',      c.phone              || '—'],
            ['Pickup Date',  c.date               || '—'],
            ['Date Ordered', latest.dateOrdered   || '—'],
            ['Status',       latest.status        || 'Pending']
        ];

        /* Render the order details safely into the page */
        detailsEl.innerHTML = rows.map(([label, val]) => `
            <div class="confirm-row">
                <span>${escHtml(label)}</span>
                <span>${escHtml(String(val))}</span>
            </div>
        `).join('');
    }

});
</script>
  <script src="../../js/shared/theme-toggle.js" defer></script>

</body>
</html>

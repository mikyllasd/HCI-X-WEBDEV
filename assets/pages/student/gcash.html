<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | GCash Payment</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
</head>
<body>

<!-- App bar -->
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='pay-method.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">GCash Payment</span>
        <span class="appbar-subtitle">Step 3 of 3</span>
    </div>
</header>

<main class="page">
    <div class="layout-half">
        <!-- Left: order summary + QR/instructions -->
        <div class="col-left">
            <div class="card">
                <div class="card-head">
                    <div class="card-title">Order Summary</div>
                </div>
                <div id="gcash-cart-items-list"></div>
                <hr class="divider" style="margin:1rem 0;" />
                <div class="summary-total-row">
                    <span class="summary-total-label">Total Amount</span>
                    <span class="summary-total-money" id="gcash-sum-total">₱0.00</span>
                </div>
            </div>
            <div class="card card-blue">
                <div class="card-head">
                    <div class="card-title">Payment Instructions</div>
                    <div class="card-subtitle">Scan the QR code or send to:</div>
                </div>
                <div class="gcash-number">UPRESSease | 0912 345 6789</div>
                <div class="gcash-amount">Amount to send: <strong id="gcash-amount">₱0.00</strong></div>
                <div class="qr-wrapper">
                    <div class="qr-box">
                        <div class="qr-placeholder">
                            <span>📱</span><span>GCash QR Code</span>
                        </div>
                        <div class="qr-label">GCash QR Code</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: reference number + proof upload -->
        <div class="col-right">
            <div class="card card-sticky">
                <div class="card-head">
                    <div class="card-title">Payment Details</div>
                    <div class="card-subtitle">Enter your GCash reference number after payment</div>
                </div>
                <div class="field">
                    <label class="label">GCash Reference Number: *</label>
                    <input class="input" type="text" id="gcash-ref" placeholder="e.g., 1001 234 567 890" />
                </div>
                <div class="field">
                    <label class="label">Upload Proof of Payment: *</label>
                    <input class="input" type="file" id="gcash-proof" accept="image/*,.pdf" />
                </div>
                <!-- Order info summary -->
                <div class="order-info-box">
                    <div class="order-info-row"><span>Name:</span><span id="gcash-info-name">—</span></div>
                    <div class="order-info-row"><span>Contact:</span><span id="gcash-info-phone">—</span></div>
                    <div class="order-info-row"><span>Delivery Date:</span><span id="gcash-info-date">—</span></div>
                </div>
                <button class="btn-proceed" onclick="submitGcashPayment()">SUBMIT ORDER</button>
            </div>
        </div>
    </div>
</main>

<script src="../../js/student/student.js"></script>
<script>
    // GCASH PAGE LOGIC
    const cart     = Cart.get();
    const total    = Cart.total();
    const co       = Checkout.get();
    const customer = co.customerInfo || {};

    const listEl  = document.getElementById('gcash-cart-items-list');
    const totalEl = document.getElementById('gcash-sum-total');
    const amtEl   = document.getElementById('gcash-amount');

    if (listEl) {
        listEl.innerHTML = cart.map(item => `
            <div class="pay-cart-item-mini">
                <div>
                    <div class="pay-cart-item-mini-name">${escHtml(item.service)}</div>
                    <div class="pay-cart-item-mini-desc">${escHtml(item.desc || '')}</div>
                </div>
                <div class="pay-cart-item-mini-price">₱${parseFloat(item.total).toFixed(2)}</div>
            </div>`).join('');
    }

    const totalStr = '₱' + total.toFixed(2);
    if (totalEl) totalEl.textContent = totalStr;
    if (amtEl)   amtEl.textContent   = totalStr;

    setText('gcash-info-name',  customer.name  || '—');
    setText('gcash-info-phone', customer.phone || '—');
    setText('gcash-info-date',  customer.date  || '—');

    function submitGcashPayment() {
        const ref   = document.getElementById('gcash-ref')?.value.trim();
        const proof = document.getElementById('gcash-proof')?.files[0];
        if (!ref)   { showAlert('Missing Info', 'Please enter your GCash reference number.'); return; }
        if (!proof) { showAlert('Missing Info', 'Please upload your proof of payment screenshot.'); return; }
        // Finalize all cart items as orders
        cart.forEach(item => {
            Orders.add({ ...item, customer, paymentMethod: 'GCash', refNumber: ref });
        });
        Cart.clear();
        Checkout.clear();
        updateCartBadge();
        window.location.href = 'confirm.html';
    }
</script>
</body>
</html>

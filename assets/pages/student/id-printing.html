<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Printing | UPRESSease</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/printing.css" />
</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">ID printing</span>
        <span class="appbar-subtitle">UPRESSease — WMSU</span>
    </div>
    <span></span>
</header>
<main class="page">
    <div class="card" style="max-width: 36rem; margin: 0 auto;">
        <div class="card-head">
            <div class="card-title">Request type</div>
            <div class="card-subtitle">Reason drives documents, payment, and scheduling (per UPress policy).</div>
        </div>
        <div class="field">
            <label class="label">What type of ID request is this?</label>
            <select class="input" id="id-reason">
                <option value="">— Select —</option>
                <option value="new">New ID (free — in-person visit)</option>
                <option value="lost">Lost (affidavit + payment)</option>
                <option value="damaged">Damaged (surrender old ID + payment)</option>
                <option value="renewal">Renewal (payment)</option>
            </select>
        </div>
        <p id="id-reason-hint" class="card-subtitle" style="min-height: 3rem; margin-top: 0.5rem;"></p>
        <div id="id-affidavit-wrap" style="display:none;" class="field">
            <label class="label">Affidavit of loss (PDF / JPG / PNG)</label>
            <input type="file" id="id-affidavit" accept=".pdf,image/*" class="input" />
        </div>
        <button type="button" class="btn-red" id="id-continue" style="width:100%; margin-top: 0.5rem;">Continue (demo)</button>
        <p class="card-subtitle" style="margin-top: 1rem;">Full flow: checkout when paid → appointment calendar → staff attendance → staff verifies payment before release.</p>
    </div>
</main>

<script src="../../js/student/student.js"></script>
<script src="../../js/student/id-printing.js"></script>
</body>
</html>

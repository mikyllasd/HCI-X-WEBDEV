<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){var k='upress-theme';var s=localStorage.getItem(k);var t=(s==='dark'||s==='light')?s:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>

    <title>UPRESSease | My Orders</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/orders.css" />
  <link rel="stylesheet" href="../../css/upress-theme-toggle.css" />

</head>
<body>

<div class="orders-header">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <div class="header-text">
        <h2>My Orders</h2>
        <p class="subtitle">Track and manage your orders</p>
    </div>
</div>

<!-- Type Filter -->
<div class="manage-tabs" id="type-tabs-bar">
    <button class="manage-tab active" data-type="individual">
        Individual <span class="tab-count">0</span>
    </button>
    <button class="manage-tab" data-type="organization" id="org-orders-tab" style="display:none;">
        Organization <span class="tab-count">0</span>
    </button>
</div>

<!-- Status Filter -->
<div class="status-tabs" id="status-tabs-bar">
    <button class="status-tab active" data-status="all">
        All <span class="tab-count">0</span>
    </button>
    <button class="status-tab" data-status="Pending">
        Pending <span class="tab-count">0</span>
    </button>
    <button class="status-tab" data-status="Processing">
        Processing <span class="tab-count">0</span>
    </button>
    <button class="status-tab" data-status="Ready">
        Ready <span class="tab-count">0</span>
    </button>
    <button class="status-tab" data-status="Completed">
        Completed <span class="tab-count">0</span>
    </button>
    <button class="status-tab" data-status="Cancelled">
        Cancelled <span class="tab-count">0</span>
    </button>
</div>

<div id="orders-list" class="orders-list-wrapper"></div>

<!-- Rating Modal -->
<div id="rating-modal" class="rating-modal-overlay" style="display:none;">
    <div class="rating-modal">
        <div class="rating-modal-header">
            <h3>Rate Your Experience</h3>
            <button class="rating-close-btn" id="rating-close-btn">✕</button>
        </div>
        <p class="rating-order-label" id="rating-order-label"></p>

        <div class="rating-categories">
            <div class="rating-category">
                <div class="rating-cat-title">
                    <span class="rating-cat-icon">📦</span> Product
                </div>
                <div class="star-group" data-category="product">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <div class="rating-message-wrap">
                    <label for="rating-product-message">Message for product <span>(optional)</span></label>
                    <textarea id="rating-product-message" placeholder="Share your feedback..." rows="2"></textarea>
                </div>
            </div>
            <div class="rating-category">
                <div class="rating-cat-title">
                    <span class="rating-cat-icon">🛠️</span> Service
                </div>
                <div class="star-group" data-category="service">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <div class="rating-message-wrap">
                    <label for="rating-service-message">Message for service <span>(optional)</span></label>
                    <textarea id="rating-service-message" placeholder="Share your feedback..." rows="2"></textarea>
                </div>
            </div>
        </div>

        <div class="rating-modal-actions">
            <button type="button" class="rating-skip-btn" id="rating-skip-btn">Skip for now</button>
            <button type="button" class="rating-submit-btn" id="rating-submit-btn">Submit Rating</button>
        </div>
    </div>
</div>

<script src="../../js/shared/storage.js"></script>
<script src="../../js/student/student.js"></script>
<script src="../../js/student/orders.js"></script>
  <script src="../../js/shared/theme-toggle.js" defer></script>

</body>
</html>

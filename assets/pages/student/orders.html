<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | My Orders</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/orders.css" />
</head>
<body>

<div class="orders-header">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <div class="header-text">
        <h2>My Orders</h2>
        <p class="subtitle">Track and manage your orders</p>
    </div>
</div>

<div class="manage-tabs" id="tabs-bar">
    <button class="manage-tab active" data-filter="all">
        All (<span class="tab-count" data-status="all">0</span>)
    </button>
    <button class="manage-tab" data-filter="Pending">
        Pending (<span class="tab-count" data-status="Pending">0</span>)
    </button>
    <button class="manage-tab" data-filter="Processing">
        Processing (<span class="tab-count" data-status="Processing">0</span>)
    </button>
    <button class="manage-tab" data-filter="Ready">
        Ready (<span class="tab-count" data-status="Ready">0</span>)
    </button>
    <button class="manage-tab" data-filter="Completed">
        Completed (<span class="tab-count" data-status="Completed">0</span>)
    </button>
</div>

<div id="orders-list" class="orders-list-wrapper"></div>

<!-- Rating Modal -->
<div id="rating-modal" class="rating-modal-overlay" style="display:none;">
    <div class="rating-modal">
        <div class="rating-modal-header">
            <h3>Rate Your Experience</h3>
            <button class="rating-close-btn" id="rating-close-btn">✕</button>
        </div>
        <p class="rating-order-label" id="rating-order-label"></p>

        <div class="rating-categories">

            <div class="rating-category">
                <div class="rating-cat-title">
                    <span class="rating-cat-icon">🖥️</span> System
                </div>
                <div class="star-group" data-category="system">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
            </div>

            <div class="rating-category">
                <div class="rating-cat-title">
                    <span class="rating-cat-icon">👤</span> Staff
                </div>
                <div class="star-group" data-category="staff">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
            </div>

            <div class="rating-category">
                <div class="rating-cat-title">
                    <span class="rating-cat-icon">🛡️</span> Admin
                </div>
                <div class="star-group" data-category="admin">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
            </div>

        </div>

        <div class="rating-message-wrap">
            <label for="rating-message">Message <span>(optional)</span></label>
            <textarea id="rating-message" placeholder="Share your feedback..." rows="3"></textarea>
        </div>

        <button class="rating-submit-btn" id="rating-submit-btn">Submit Rating</button>
    </div>
</div>

<script src="../../js/student/student.js"></script>
<script src="../../js/student/orders.js"></script>
</body>
</html>

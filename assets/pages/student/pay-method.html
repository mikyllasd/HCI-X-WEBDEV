<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){var k='upress-theme';var s=localStorage.getItem(k);var t=(s==='dark'||s==='light')?s:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>

    <title>UPRESSease | Payment Method</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/pay-method.css" />
  <link rel="stylesheet" href="../../css/upress-theme-toggle.css" />

</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='payment.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">Select Payment Method</span>
        <span class="appbar-subtitle">Step 2 of 3</span>
    </div>
</header>
<main class="page">
    <div class="layout-half">
        <div class="col-left">
            <div class="card">
                <div class="card-head">
                    <div class="card-title">Order Summary</div>
                    <div class="card-subtitle" id="pm-cart-count">1 service(s) in cart</div>
                </div>
                <div id="pm-cart-items-list"></div>
                <hr class="divider" style="margin:1rem 0;" />
                <div class="summary-total-row">
                    <span class="summary-total-label">Total Amount</span>
                    <span class="summary-total-money" id="pm-sum-total">₱0.00</span>
                </div>
                <div id="downpayment-section" style="display:none;margin-top:1rem;padding:1rem;background:#f9f3f3;border-left:4px solid #a32020;border-radius:0.25rem;">
                    <div class="summary-row" style="font-size:0.875rem;margin-bottom:0.5rem;">
                        <span>50% Downpayment Required</span>
                        <span id="pm-downpayment" style="font-weight:700;color:#a32020;">₱0.00</span>
                    </div>
                    <div class="summary-row" style="font-size:0.875rem;">
                        <span>Balance Due at Pickup</span>
                        <span id="pm-balance" style="font-weight:700;color:#666;">₱0.00</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="card">
                <div class="card-head"><div class="card-title">Select Payment Method:</div></div>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="gcash" class="payment-radio" />
                        <div class="payment-icon payment-icon--blue"><span class="upress-icon upress-icon--card" aria-hidden="true"></span></div>
                        <div class="payment-text">
                            <span class="payment-name">GCash</span>
                            <span class="payment-desc">Pay now via GCash</span>
                        </div>
                        <div class="payment-check"><span class="upress-icon upress-icon--check" aria-hidden="true"></span></div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="cash" class="payment-radio" />
                        <div class="payment-icon payment-icon--green"><span class="upress-icon upress-icon--wallet" aria-hidden="true"></span></div>
                        <div class="payment-text">
                            <span class="payment-name">Cash on Pick-up</span>
                            <span class="payment-desc">Pay when you pick up your order</span>
                        </div>
                        <div class="payment-check"><span class="upress-icon upress-icon--check" aria-hidden="true"></span></div>
                    </label>
                </div>
            </div>
            <button class="btn-proceed" onclick="proceedPayment()">PROCEED</button>
        </div>
    </div>
</main>
<script src="../../js/student/student.js"></script>
<script src="../../js/shared/discounts.js"></script>
<script src="../../js/student/pay-method.js"></script>
  <script src="../../js/shared/theme-toggle.js" defer></script>

</body>
</html>

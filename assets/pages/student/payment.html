<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | Checkout</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/payment.css" />
</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="goBackToCart()">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">Checkout</span>
        <span class="appbar-subtitle">Part 6 of 6</span>
    </div>
</header>
<main class="page">
    <div class="layout-half">
        <div class="col-left">
            <div class="card">
                <div class="card-head">
                    <div class="card-title"><span class="upress-icon upress-icon--cart" aria-hidden="true"></span> Order Summary</div>
                    <div class="card-subtitle" id="checkout-item-count">Review your complete order</div>
                </div>
                <div id="checkout-items-list" class="checkout-items-list"></div>
            </div>
        </div>
        <div class="col-right">
            <div class="card card-sticky">
                <div class="card-head">
                    <div class="card-title">Order Total</div>
                    <div class="card-subtitle">Ready to confirm</div>
                </div>
                <div class="checkout-summary-row">
                    <span class="checkout-summary-label">Subtotal</span>
                    <span class="checkout-summary-value" id="checkout-subtotal">₱0.00</span>
                </div>
                <hr class="divider" />
                <div class="checkout-summary-row checkout-summary-row--total">
                    <span class="checkout-summary-label">Total Amount Due</span>
                    <span class="checkout-summary-value checkout-summary-value--total" id="checkout-total">₱0.00</span>
                </div>
                <div class="checkout-actions">
                    <button class="btn-secondary" onclick="goBackToCart()">← Back</button>
                    <button class="btn-proceed" onclick="proceedToConfirmation()">Confirm Order</button>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../../js/student/student.js"></script>
<script src="../../js/student/payment.js"></script>
</body>
</html>

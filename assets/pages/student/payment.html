<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | Customer Information</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/payment.css" />
</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='cart.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">Customer Information</span>
        <span class="appbar-subtitle">Step 1 of 3</span>
    </div>
</header>
<main class="page">
    <div class="layout-half">
        <div class="col-left">
            <div class="card">
                <div class="card-head">
                    <div class="card-title"><span class="upress-icon upress-icon--cart" aria-hidden="true"></span> Your Cart</div>
                    <div class="card-subtitle" id="pay-cart-count">Review your items before checkout</div>
                </div>
                <div id="pay-cart-items-list"></div>
            </div>
            <div class="card">
                <div class="card-head"><div class="card-title">Order Summary</div></div>
                <hr class="divider" />
                <div class="summary-total-row">
                    <span class="summary-total-label">Total Amount</span>
                    <span class="summary-total-money" id="pay-sum-total">₱0.00</span>
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="card card-sticky">
                <div class="card-head">
                    <div class="card-title">Customer Information</div>
                    <div class="card-subtitle">Required for order processing</div>
                </div>
                <div class="field"><label class="label">Full Name *</label><input class="input" type="text" id="pay-full-name" placeholder="Your full name" /></div>
                <div class="field"><label class="label">Preferred Delivery Date *</label><input class="input" type="date" id="pay-date" /></div>
                <div class="field">
                    <label class="label">Contact Number *</label>
                    <div class="input-icon-wrap">
                        <span class="input-icon"><span class="upress-icon upress-icon--phone" aria-hidden="true"></span></span>
                        <input class="input input-with-icon" type="tel" id="pay-contact" placeholder="09xxxxxxxxx" />
                    </div>
                </div>
                <div class="use-number-row" id="pay-number-toggle-row" style="display:none;">
                    <span class="use-number-label">Use your registered number?</span>
                    <div class="toggle-btns">
                        <button class="toggle-btn toggle-btn--active" id="pay-yes-btn" onclick="togglePayNumber(true)">Yes</button>
                        <button class="toggle-btn" id="pay-no-btn" onclick="togglePayNumber(false)">No</button>
                    </div>
                </div>
                <button class="btn-proceed" onclick="proceedToPayMethod()">PROCEED TO PAYMENT</button>
            </div>
        </div>
    </div>
</main>
<script src="../../js/student/student.js"></script>
<script src="../../js/student/payment.js"></script>
</body>
</html>

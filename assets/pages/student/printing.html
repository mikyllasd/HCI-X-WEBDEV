<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | Printing Order</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/printing.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.9.1/mammoth.browser.min.js"></script>
</head>
<body>
<header class="appbar">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <div class="appbar-titles">
        <span class="appbar-title">Printing Order</span>
        <span class="appbar-subtitle">UPRESSease - WMSU</span>
    </div>
    <button type="button" class="appbar-action" onclick="window.location.href='cart.html'">
        <span class="upress-icon upress-icon--cart" aria-hidden="true"></span> Cart <span class="cart-badge"></span>
    </button>
</header>
<main class="page">
    <div class="layout-2col">
        <div class="col-main">

            <!-- Quantity first -->
            <div class="card">
                <div class="card-head">
                    <div class="card-title">How many copies do you need?</div>
                    <div class="card-subtitle">Each copy can have a different file and settings</div>
                </div>
                <div class="field">
                    <label class="label">Number of Copies *</label>
                    <input class="input" type="number" id="print-qty" value="1" min="1" max="100" oninput="onPrintQtyChange()" style="max-width:180px;" />
                </div>
                <!-- Same file for all copies checkbox -->
                <label class="checkbox-row" id="same-file-row" style="display:none;margin-top:0.5rem;">
                    <input type="checkbox" id="same-file-all" onchange="onSameFileToggle()" />
                    Same file and settings for all copies
                </label>
            </div>

            <!-- Per-copy slots -->
            <div id="print-copy-slots"></div>

            <!-- Special Instructions -->
            <div class="card">
                <div class="card-head">
                    <div class="card-title">Special Instructions</div>
                    <div class="card-subtitle">Optional notes for the entire order</div>
                </div>
                <div class="field">
                    <textarea class="input textarea" id="print-special" placeholder="Any special instructions for the whole order (optional)..."></textarea>
                </div>
            </div>

        </div>
        <aside class="col-side">
            <div class="card card-sticky">
                <div class="card-head"><div class="card-title">Order Summary</div></div>
                <div class="summary">
                    <div class="summary-row"><span class="summary-label">Copies</span><span class="summary-value" id="sum-print-qty">1</span></div>
                    <div class="summary-row"><span class="summary-label">Paper Size</span><span class="summary-value" id="sum-print-paper">—</span></div>
                    <div class="summary-row"><span class="summary-label">Color</span><span class="summary-value" id="sum-print-color">—</span></div>
                    <div class="summary-row" id="print-addons-row" style="display:none;">
                        <span class="summary-label">Add-ons</span>
                        <span class="summary-value" id="sum-print-addons" style="font-size:0.75rem;text-align:right;max-width:60%;"></span>
                    </div>
                    <hr class="divider" />
                    <div class="summary-row">
                        <span class="summary-label summary-total-label">Total</span>
                        <span class="summary-money" id="sum-print-total">₱0.00</span>
                    </div>
                    <button type="button" class="btn-order" onclick="printOrderNow()">
                        <span class="upress-icon upress-icon--cart" aria-hidden="true"></span> Order Now
                    </button>
                    <button class="btn-cart" onclick="printAddToCart()">+ Add to Cart</button>
                </div>
            </div>
        </aside>
    </div>
</main>

<script src="../../js/student/student.js"></script>
<script src="../../js/site-pricing.js"></script>
<script src="../../js/student/printing.js"></script>
</body>
</html>

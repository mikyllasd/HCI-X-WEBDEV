<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease | Sign Up</title>
    <link rel="stylesheet" href="../../css/student/student.css" />
    <link rel="stylesheet" href="../../css/student/signup.css" />
</head>
<body class="signup-bg">

    <!-- Main card -->
    <main class="signup-main">
        <div class="signup-card">

            <!-- Card header -->
            <div class="signup-card-head">
                <div class="signup-avatar">🎓</div>
                <h1 class="signup-title">Create Account</h1>
                <p class="signup-subtitle">Sign up for UPRESSease</p>
            </div>

            <form id="signup-form" onsubmit="return validateSignup(event);">
                <div class="signup-panels">

                    <!-- LEFT PANEL: Personal Information -->
                    <div class="signup-panel">
                        <div class="signup-section-label">Personal Information</div>
                        <hr class="signup-divider" />

                        <div class="signup-grid-2">
                            <div class="sfield">
                                <label class="slabel">Full Name *</label>
                                <input class="sinput" type="text" id="signup-name" placeholder="Juan Dela Cruz" required />
                            </div>
                            <div class="sfield">
                                <label class="slabel">WMSU Email *</label>
                                <div class="sinput-verify-row">
                                    <input class="sinput" type="email" id="signup-email" placeholder="student@wmsu.edu.ph" required />
                                    <button type="button" class="verify-btn" onclick="sendOtp()">✉ Verify</button>
                                </div>
                            </div>
                        </div>

                        <div class="signup-grid-2">
                            <div class="sfield">
                                <label class="slabel">Phone Number *</label>
                                <div class="sinput-verify-row">
                                    <input class="sinput" type="tel" id="signup-phone" placeholder="09xxxxxxxxx" pattern="09[0-9]{9}" required />
                                    <button type="button" class="verify-btn" onclick="sendOtp()">📞 Verify</button>
                                </div>
                            </div>
                            <div class="sfield">
                                <label class="slabel">Year Level *</label>
                                <select class="sinput" id="signup-year" required>
                                    <option value="">e.g., 3rd Year</option>
                                    <option>1st Year</option>
                                    <option>2nd Year</option>
                                    <option>3rd Year</option>
                                    <option>4th Year</option>
                                    <option>5th Year</option>
                                </select>
                            </div>
                        </div>

                        <div class="sfield">
                            <label class="slabel">College *</label>
                            <select class="sinput" id="signup-college" required onchange="populateCourses('signup-college','signup-course')">
                                <option value="">Select a college</option>
                                <option>College of Arts and Sciences</option>
                                <option>College of Education</option>
                                <option>College of Engineering</option>
                                <option>College of Business Administration</option>
                            </select>
                        </div>

                        <div class="sfield">
                            <label class="slabel">Course *</label>
                            <select class="sinput" id="signup-course" required>
                                <option value="">Please select a college first</option>
                            </select>
                        </div>
                    </div>

                    <!-- RIGHT PANEL: Account Security -->
                    <div class="signup-panel">
                        <div class="signup-section-label">Account Security</div>
                        <hr class="signup-divider" />

                        <div class="signup-grid-2">
                            <div class="sfield">
                                <label class="slabel">Password *</label>
                                <div class="sinput-eye-wrap">
                                    <input class="sinput" type="password" id="signup-pass" placeholder="Enter password" required />
                                    <button type="button" class="eye-btn" onclick="togglePass('signup-pass', this)">👁</button>
                                </div>
                            </div>
                            <div class="sfield">
                                <label class="slabel">Confirm Password *</label>
                                <div class="sinput-eye-wrap">
                                    <input class="sinput" type="password" id="signup-pass2" placeholder="Re-enter password" required />
                                    <button type="button" class="eye-btn" onclick="togglePass('signup-pass2', this)">👁</button>
                                </div>
                            </div>
                        </div>

                        <div class="signup-section-label" style="margin-top:1rem;">Required Documents</div>
                        <hr class="signup-divider" />

                        <div class="signup-grid-2">
                            <div class="sfield">
                                <label class="slabel">Validated ID *</label>
                                <label class="sdropzone" id="id-drop">
                                    <input type="file" id="signup-id" accept="image/*,.pdf" required style="display:none;" onchange="showFileName('signup-id','id-name')" />
                                    <span class="sdrop-icon">⬆</span>
                                    <span class="sdrop-primary">Upload Validated ID</span>
                                    <span class="sdrop-hint">Click to upload</span>
                                    <span class="sdrop-filename" id="id-name"></span>
                                </label>
                            </div>
                            <div class="sfield">
                                <label class="slabel">First Semester COR *</label>
                                <label class="sdropzone" id="cor-drop">
                                    <input type="file" id="signup-cor" accept="image/*,.pdf" required style="display:none;" onchange="showFileName('signup-cor','cor-name')" />
                                    <span class="sdrop-icon">⬆</span>
                                    <span class="sdrop-primary">Upload COR</span>
                                    <span class="sdrop-hint">Click to upload</span>
                                    <span class="sdrop-filename" id="cor-name"></span>
                                </label>
                            </div>
                        </div>

                        <p class="sdoc-note">* Upload clear photos or scanned copies of your validated ID and Certificate of Registration</p>

                        <!-- OTP row -->
                        <div class="sotp-row">
                            <input type="text" class="sinput" id="user-otp" placeholder="Enter OTP code" disabled />
                            <button type="button" class="verify-btn" onclick="verifyOtp()">Verify OTP</button>
                        </div>
                        <div id="otp-status" class="sotp-status"></div>

                        <!-- Terms -->
                        <div class="signup-terms-row">
                            <input type="checkbox" id="terms-check" required />
                            <label for="terms-check">I agree to the <a href="terms.html">terms and conditions</a>.</label>
                        </div>
                    </div>

                </div><!-- end panels -->

                <button type="submit" class="signup-submit-btn">Create Account</button>
                <a href="index.html" class="back-login-btn">← Back to Login</a>

            </form>
        </div>
    </main>

    <script src="../../js/student/student.js"></script>
    <script src="../../js/student/signup.js"></script>
</body>
</html>

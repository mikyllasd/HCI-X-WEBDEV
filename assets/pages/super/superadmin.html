<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPRESSease – Admin Portal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="../../css/admin/admin-dashboard.css" />
    <link rel="stylesheet" href="../../css/staff/staff.css" />
    <link rel="stylesheet" href="../../css/upress-super-content.css" />
    <link rel="stylesheet" href="superadmin.css" />
    <link rel="stylesheet" href="../../css/upress-super-widgets.css" />
    <link rel="stylesheet" href="../../css/upress-console.css" />
  </head>
  <body class="staff-dashboard-body">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="app-wrapper staff-layout sd-layout">
      <aside
        class="sidebar staff-sidebar"
        id="sidebar"
        role="navigation"
        aria-label="Superadmin sidebar"
      >
        <div class="sidebar-brand">
          <div class="brand-icon" aria-hidden="true">
            <i data-lucide="shield"></i>
          </div>
          <div>
            <span class="brand-name">UPRESSease</span>
            <span class="brand-sub">Admin portal</span>
          </div>
          <button
            class="sidebar-close"
            id="sidebarClose"
            type="button"
            aria-label="Close sidebar"
          >
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <div class="sidebar-user">
          <button class="user-pill" type="button" aria-label="Logged in as superadmin">
            <i data-lucide="user" aria-hidden="true"></i>
            <span>Superadmin</span>
          </button>
          <p class="user-handle">@superadmin</p>
        </div>
        <nav class="sidebar-nav" aria-label="Main navigation">
          <ul class="nav-list" role="list">
            <li>
              <a href="#" class="nav-link active" data-page="dashboard" aria-current="page">
                <i data-lucide="layout-dashboard" aria-hidden="true"></i
                ><span>Dashboard</span></a
              >
            </li>
            <li>
              <a href="#" class="nav-link" data-page="users">
                <i data-lucide="users" aria-hidden="true"></i
                ><span>Manage Users</span></a
              >
            </li>
            <li>
              <a href="#" class="nav-link" data-page="pricing">
                <i data-lucide="circle-dollar-sign" aria-hidden="true"></i
                ><span>Pricing Settings</span></a
              >
            </li>
            <li>
              <a href="#" class="nav-link" data-page="policies">
                <i data-lucide="file-text" aria-hidden="true"></i
                ><span>Policies</span></a
              >
            </li>
            <li>
              <a href="#" class="nav-link" data-page="reports">
                <i data-lucide="bar-chart-2" aria-hidden="true"></i
                ><span>Reports</span></a
              >
            </li>
            <li>
              <a href="#" class="nav-link" data-page="settings">
                <i data-lucide="settings" aria-hidden="true"></i
                ><span>System Settings</span></a
              >
            </li>
          </ul>
          <ul class="nav-list nav-list--bottom" role="list">
            <li>
              <a
                href="#"
                class="nav-link nav-link--logout"
                id="logoutBtn"
                data-page="logout"
                aria-label="Logout"
              >
                <i data-lucide="log-out" aria-hidden="true"></i
                ><span>Logout</span></a
              >
            </li>
          </ul>
        </nav>
      </aside>
      <main class="main-content staff-main sd-main" role="main">
        <button
          class="hamburger main-hamburger"
          id="hamburger"
          type="button"
          aria-label="Open menu"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="page-container" id="pageContainer"></div>
      </main>
    </div>

    <!-- ===== ADD USER MODAL ===== -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="addUserModal">
        <div class="modal-header">
          <div>
            <h3 class="modal-title">Add New User</h3>
            <p class="modal-sub">Create a new admin or staff account</p>
          </div>
          <button class="modal-close" id="modalClose">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label"
              >Username <span class="required">*</span></label
            >
            <input
              type="text"
              class="form-input"
              id="newUsername"
              placeholder="Enter username"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Full Name <span class="required">*</span></label
            >
            <input
              type="text"
              class="form-input"
              id="newFullName"
              placeholder="Enter full name"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Email <span class="required">*</span></label
            >
            <input
              type="email"
              class="form-input"
              id="newEmail"
              placeholder="Enter email"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Password <span class="required">*</span></label
            >
            <div class="input-icon-wrap">
              <input
                type="password"
                class="form-input"
                id="newPassword"
                placeholder="Enter password"
              />
              <button class="input-icon-btn" id="togglePassword" type="button">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label"
              >Role <span class="required">*</span></label
            >
            <select class="form-input form-select" id="newRole">
              <option value="Admin">Admin</option>
              <option value="Staff">Staff</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button class="btn btn-primary" id="modalSubmit">Add User</button>
        </div>
      </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      <span id="toastMsg">Action completed successfully!</span>
    </div>

    <script src="../../js/site-pricing.js"></script>
    <script src="../../js/super/superadmin.js"></script>
  </body>
</html>

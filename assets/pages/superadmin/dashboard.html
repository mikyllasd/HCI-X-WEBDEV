<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){var k='upress-theme';var s=localStorage.getItem(k);var t=(s==='dark'||s==='light')?s:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>

    <title>UPRESSease – Superadmin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="../../css/admin/admin-dashboard.css" />
    <link rel="stylesheet" href="../../css/staff/staff.css" />
    <link rel="stylesheet" href="../../css/upress-super-content.css" />
    <link rel="stylesheet" href="../../css/upress-super-widgets.css" />
    <link rel="stylesheet" href="../../css/upress-console.css" />
    <link rel="stylesheet" href="../../css/superadmin/dashboard.css" />
  <link rel="stylesheet" href="../../css/upress-theme-toggle.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body class="staff-dashboard-body" data-page="dashboard">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="app-wrapper staff-layout sd-layout">
      <aside
        class="sidebar staff-sidebar"
        id="sidebar"
        role="navigation"
        aria-label="Superadmin sidebar"
      >
        <div class="sidebar-brand">
          <div class="brand-icon" aria-hidden="true">
            <i data-lucide="shield"></i>
          </div>
          <div>
            <span class="brand-name">UPRESSease</span>
            <span class="brand-sub">Superadmin</span>
          </div>
          <button
            class="sidebar-close"
            id="sidebarClose"
            type="button"
            aria-label="Close sidebar"
          >
            <i data-lucide="x" aria-hidden="true"></i>
          </button>
        </div>
        <div class="sidebar-user">
          <button
            class="user-pill"
            type="button"
            aria-label="Logged in as superadmin"
          >
            <i data-lucide="user" aria-hidden="true"></i>
            <span>Superadmin</span>
          </button>
          <p class="user-handle">@superadmin</p>
        </div>
        <nav class="sidebar-nav" aria-label="Main navigation">
          <ul class="nav-list" role="list">
            <li>
              <a
                href="dashboard.html"
                class="nav-link active"
                data-page="dashboard"
                aria-current="page"
              >
                <i data-lucide="layout-dashboard" aria-hidden="true"></i
                ><span>Dashboard</span></a
              >
            </li>
            <li>
              <a href="users.html" class="nav-link" data-page="users">
                <i data-lucide="users" aria-hidden="true"></i
                ><span>Manage Users</span></a
              >
            </li>
            <li>
              <a href="services.html" class="nav-link" data-page="services">
                <i data-lucide="settings" aria-hidden="true"></i
                ><span>Services</span></a
              >
            </li>
            <li>
              <a href="reports.html" class="nav-link" data-page="reports">
                <i data-lucide="bar-chart-2" aria-hidden="true"></i
                ><span>Reports</span></a
              >
            </li>
            <li>
              <a href="archive.html" class="nav-link" data-page="archive">
                <i data-lucide="archive" aria-hidden="true"></i
                ><span>Archives</span></a
              >
            </li>
            <li>
              <a href="settings.html" class="nav-link" data-page="settings">
                <i data-lucide="settings" aria-hidden="true"></i
                ><span>System Settings</span></a
              >
            </li>
          </ul>
          <ul class="nav-list nav-list--bottom" role="list">
            <li>
              <a
                href="#"
                class="nav-link nav-link--logout"
                id="logoutBtn"
                data-page="logout"
                aria-label="Logout"
              >
                <i data-lucide="log-out" aria-hidden="true"></i
                ><span>Logout</span></a
              >
            </li>
          </ul>
        </nav>
      </aside>
      <main class="main-content staff-main sd-main" role="main">
        <button
          class="hamburger main-hamburger"
          id="hamburger"
          type="button"
          aria-label="Open menu"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="page-container" id="pageContainer">
          <!-- Dashboard content will be loaded here -->
        </div>
      </main>
    </div>
    <div class="toast" id="toast">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      <span id="toastMsg">Action completed successfully!</span>
    </div>
    <script src="../../js/shared/demo-seed.js"></script>
    <script src="../../js/shared/storage.js"></script>
    <script src="../../js/shared/superadmin-shell.js"></script>
    <script src="../../js/superadmin/dashboard.js"></script>
  <script src="../../js/shared/theme-toggle.js" defer></script>
    <script src="dashboard.js"></script>
  </body>
</html>

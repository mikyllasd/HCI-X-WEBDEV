<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printing Order - UPRESSease</title>
<link rel="stylesheet" href="printing.css">
</head>

<body>

<header class="appbar">
<div class="appbar__inner">

<a class="appbar__back" href="#">←</a>

<div class="appbar__titles">
<div class="appbar__title">Printing Order</div>
<div class="appbar__subtitle">UPRESSease - WMSU</div>
</div>

</div>
</header>


<main class="page">

<section class="layout">

<!-- LEFT COLUMN -->

<div class="col col--main">

<article class="card">

<div class="card__head">
<div class="card__title">Upload File</div>
<div class="card__subtitle">Upload your document for printing</div>
</div>

<label class="dropzone">

<input class="dropzone__input" type="file">

<div class="dropzone__icon">📄</div>

<div class="dropzone__text">

<span class="dropzone__primary">Click to upload</span>
<span class="dropzone__secondary">or drag and drop</span>
<span class="dropzone__hint">PDF, DOC, DOCX (MAX. 50MB)</span>

</div>

</label>

</article>


<article class="card">

<div class="card__head">
<div class="card__title">Order Details</div>
<div class="card__subtitle">Configure your printing options</div>
</div>

<form class="form">

<div class="grid-2">

<div class="field">
<label class="label">Paper Size</label>
<select class="select">
<option>Select paper size</option>
<option>A4</option>
<option>Letter</option>
<option>Legal</option>
</select>
</div>

<div class="field">
<label class="label">Color Option</label>
<select class="select">
<option>Select color option</option>
<option>Black & White</option>
<option>Colored</option>
</select>
</div>

</div>

<div class="field">
<label class="label">Quantity</label>
<input class="input" type="number" value="1">
</div>

</form>

</article>

</div>


<!-- RIGHT COLUMN -->

<aside class="col col--side">

<article class="card card--sticky">

<div class="card__head">
<div class="card__title">Order Summary</div>
</div>

<div class="summary">

<div class="summary__row">
<div class="summary__label">Quantity</div>
<div class="summary__value">1</div>
</div>

<hr class="divider">

<div class="summary__row summary__row--big">
<div class="summary__label">Total Amount</div>
<div class="summary__value summary__value--money">₱0.00</div>
</div>

<a href="printing-details.html" class="proceed-button">
Proceed to Order
</a>

<div class="hint">
Tip: Use preview before printing.
</div>

</div>

</article>

</aside>

</section>

</main>

</body>
</html>

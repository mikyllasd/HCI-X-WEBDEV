<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customization</title>
    <link rel="stylesheet" href="MAIN.css">
    <link rel="stylesheet" href="mug.css">
</head>

<body>

     <header class="order-navbar">
        
       <a href="mug.html" class="back-btn">
        <span class="arrow">&larr;</span>
       </a>

        <div class="header-text">
            <h1 class="main-title"> Customize Order</h1>
            <p class="sub-title">UPRESSease - WMSU </p>
        </div>
    </header>
    
    <div class="customize-container">
    
    <form action="payment.html" method="POST" enctype="multipart/form-data">
        <div class="form-wrapper">
            
            <div class="upload-section">
                <label for="design-upload" class="upload-box tall-box">
                    <span id="file-name">UPLOAD YOUR DESIGN</span>
                    <input type="file" id="design-upload" name="design_file" accept="image/*" style="display: none;" required>
                </label>
            </div>

            <div class="details-section">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="customer_name" required>
                </div>
                
                <div class="form-group">
                    <label>Course and Year:</label>
                    <input type="text" name="course_year" required>
                </div>
                
                <div class="form-group">
                    <label>College:</label>
                    <input type="text" name="college" required>
                </div>

                <div class="form-group">
                    <label>Phone Number:</label>
                    <input type="tel" name="phone_number" placeholder="e.g., 09123456789" required>
                </div>
                
                <div class="form-group">
                    <label>Delivery/Pick-up Date:</label>
                    <input type="date" name="delivery_date" required>
                </div>

                <div class="form-group">
                    <label>Additional Notes:</label>
                    <textarea name="additional_notes" rows="3" placeholder="Enter specific instructions here..."></textarea>
                </div>
            </div>

             <div style="display:flex; justify-content: center; width: 100%; margin: 30px 0;">
            <a href="payment.html" class="proceed-button-1" >
            <span class="proceed">PROCEED</span>
           </a>
        </div>
            
        </div> 


    </form>

</div>

</body>
</html>

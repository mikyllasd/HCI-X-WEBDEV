<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
    <link rel="stylesheet" href="lanyard.css">
</head>

<body>

<header class="order-navbar">
    <a href="lanyard-order.html" class="back-btn">
        <span class="arrow">&larr;</span>
    </a>
    <div class="header-text">
        <h1 class="main-title">Order Details</h1>
        <p class="sub-title">UPRESSease - WMSU</p>
    </div>
</header>

<section class="details-container">

    <div class="details-left">
        <label>Quantity (How many pieces?)</label>
        <input type="number" value="1" min="1">

        <label>Needed Date</label>
        <input type="date">

        <h3>Additional Services</h3>

        <label><input type="checkbox"> ID Card Holder (+₱50)</label>
        <label><input type="checkbox"> Waterproof ID Case (+₱50)</label>
    </div>

    <div class="details-right">
        <h3>Order Summary</h3>
        <p>Quantity: 1</p>
        <p>Total Payment: ₱120.00</p>
        <a href="lanyard-payment.html" class="btn-red">
            Proceed to Payment
        </a>
    </div>

</section>

</body>
</html>

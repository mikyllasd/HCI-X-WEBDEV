<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customization</title>
    <link rel="stylesheet" href="MAIN.css">
    <link rel="stylesheet" href="lanyard.css">
</head>

<body>

     <header class="order-navbar">
        
       <a href="lanyard.html" class="back-btn">
        <span class="arrow">&larr;</span>
       </a>

        <div class="header-text">
            <h1 class="main-title"> Order Details</h1>
            <p class="sub-title">UPRESSease - WMSU </p>
        </div>
    </header>
    
   <div class="customize-container">
        
        <div class="design-setup">
            <h3>How many do you want to buy?</h3>
            <div class="setup-controls">
                <input type="number" id="num-designs" min="1" value="1">
                <button type="button" class="action-btn">SET DESIGNS</button>
            </div>
        </div>

        <div id="dynamic-designs-container">

            <div class="design-block">
                        
                <div class="upload-area">
                    <span class="upload-title">UPLOAD CHOSEN DESIGN 1</span>
                    <input type="file" id="file-1" accept="image/*,.pdf" class="hidden-file">
                    <p id="file-name-1" class="file-name-text">No file chosen</p>
                </div>
                
                <div class="design-details">
                    <h4>Details for Design 1</h4>
                    
                    <div class="form-group">
                        <label>Quantity for Design 1:</label>
                        <input type="number" min="1" value="1" required>
                    </div>
                </div>

            </div>

        </div>

        <hr class="divider">

        <div class="global-info">
            <h3>Your Details</h3>
            
            <div class="details-grid">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Course and Year:</label>
                    <input type="text" name="course_year" required>
                </div>
                <div class="form-group">
                    <label>College:</label>
                    <input type="text" name="college" required>
                </div>
                <div class="form-group">
                    <label>Phone Number:</label>
                    <input type="text" name="phone" placeholder="e.g., 09123456789" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Delivery/Pick-up Date:</label>
                    <input type="date" name="date" required>
                </div>
            </div>
        </div>

        <div class="submit-section">
            <a href="lanyard-payment.html" class="action-btn proceed-btn">PROCEED</a>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link rel="stylesheet" href="lanyard.css">
</head>

<body>

<header class="order-navbar">
    <a href="lanyard-details.html" class="back-btn">
        <span class="arrow">&larr;</span>
    </a>
    <div class="header-text">
        <h1 class="main-title">Payment</h1>
        <p class="sub-title">UPRESSease - WMSU</p>
    </div>
</header>

<section class="payment-container">

    <div class="payment-left">
        <h3>Method of Payment</h3>

        <label><input type="radio" name="payment"> GCash</label>
        <label><input type="radio" name="payment"> Cash (Cashier)</label>

        <h4>Downpayment (50%)</h4>
        <p>Please show 50% of the total.</p>

        <label class="upload-box">
            Upload Proof of Payment
            <input type="file">
        </label>

        <button class="btn-red">Submit Payment</button>
        <p class="wait-text">Wait for confirmation.</p>
    </div>

    <div class="payment-right">
        <h3>Total Payment</h3>
        <p class="price">₱120.00</p>
    </div>

</section>

</body>
</html>

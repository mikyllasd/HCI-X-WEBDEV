<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customization</title>
    <link rel="stylesheet" href="MAIN.css">
    <link rel="stylesheet" href="mug.css">
</head>

<body>

     <header class="order-navbar">
        
       <a href="mug.html" class="back-btn">
        <span class="arrow">&larr;</span>
       </a>

        <div class="header-text">
            <h1 class="main-title"> Order Details</h1>
            <p class="sub-title">UPRESSease - WMSU </p>
        </div>
    </header>
    
   <div class="customize-container">
        
        <div class="design-setup">
            <h3>How many do you want to buy?</h3>
            <div class="setup-controls">
                <input type="number" id="num-designs" min="1" value="1">
                <button type="button" onclick="generateDesignBlocks()" class="action-btn">SET DESIGNS</button>
            </div>
        </div>

        <div id="dynamic-designs-container">
            </div>

        <hr class="divider">

        <div class="global-info">
            <h3>Your Details</h3>
            
            <div class="details-grid">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Course and Year:</label>
                    <input type="text" name="course_year" required>
                </div>
                <div class="form-group">
                    <label>College:</label>
                    <input type="text" name="college" required>
                </div>
                <div class="form-group">
                    <label>Phone Number:</label>
                    <input type="text" name="phone" placeholder="e.g., 09123456789" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Delivery/Pick-up Date:</label>
                    <input type="date" name="date" required>
                </div>
            </div>
        </div>

        <div class="submit-section">
            <button type="button" onclick="window.location.href='payment-1.html'" class="action-btn proceed-btn">
                PROCEED
            </button>
        </div>

    </div>

    <script>
        // Runs automatically when the page loads so "Design 1" is visible immediately
        window.onload = function() {
            generateDesignBlocks();
        };

        function generateDesignBlocks() {
            var numDesigns = document.getElementById('num-designs').value;
            var container = document.getElementById('dynamic-designs-container');
            
            // Clear current container
            container.innerHTML = ''; 

            // Loop to create blocks
            for (let i = 1; i <= numDesigns; i++) {
                // Notice how clean this is now! Just using CSS classes.
                var blockHTML = `
                    <div class="design-block">
                        
                        <div class="upload-area" onclick="document.getElementById('file-${i}').click()">
                            <span class="upload-title">UPLOAD CHOSEN DESIGN ${i}</span>
                            <input type="file" id="file-${i}" accept="image/*,.pdf" class="hidden-file" onchange="updateFileName(${i})">
                            <p id="file-name-${i}" class="file-name-text">No file chosen</p>
                        </div>
                        
                        <div class="design-details">
                            <h4>Details for Design ${i}</h4>
                            
                            <div class="form-group">
                                <label>Quantity for Design ${i}:</label>
                                <input type="number" min="1" value="1" required>
                            </div>
                        </div>

                    </div>
                `;
                container.innerHTML += blockHTML;
            }
        }

        // Updates the text when they pick a file
        function updateFileName(designNumber) {
            var fileInput = document.getElementById('file-' + designNumber);
            var fileNameText = document.getElementById('file-name-' + designNumber);
            
            if (fileInput.files.length > 0) {
                fileNameText.innerText = "Selected: " + fileInput.files[0].name;
                fileNameText.style.color = "#4CAF50"; // Green for success
                fileNameText.style.fontWeight = "bold";
            }
        }
    </script>


    </form>

</div>

</body>
</html>

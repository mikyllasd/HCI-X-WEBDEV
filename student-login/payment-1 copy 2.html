<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Section</title>
    <link rel="stylesheet" href="MAIN.css">
    <link rel="stylesheet" href="mug.css">
    <style>
        #gcash-details {
            transition: all 0.3s ease;
        }
        #gcash-details.hidden {
            display: none;
        }

        /* Radio button styling */
        .radio-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .radio-group input[type="radio"] {
            cursor: pointer;
            margin-right: 8px;
            accent-color: #007bff;
            width: 18px;
            height: 18px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.3s ease;
            background-color: #f0f0f0;
            border: 2px solid transparent;
        }

        .radio-group input[type="radio"]:checked + label {
            background-color: #e3f2fd;
            border-color: #007bff;
            font-weight: 600;
            color: #007bff;
        }

        /* Payment section responsive */
        .payment-section {
            padding: 0 1rem;
        }

        .payment-card {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .qr-code-box {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        /* Responsive Media Queries */
        @media (max-width: 1100px) {
            .payment-card {
                padding: 1.75rem;
                max-width: 550px;
            }

            .radio-group {
                gap: 25px;
            }

            .radio-group label {
                padding: 9px 13px;
                font-size: 0.95rem;
            }

            .form-group label {
                font-size: 0.95rem;
            }

            .form-group input {
                padding: 0.6rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 900px) {
            .payment-card {
                padding: 1.5rem;
                max-width: 500px;
            }

            .radio-group {
                gap: 15px;
            }

            .radio-group label {
                padding: 8px 12px;
                font-size: 0.9rem;
            }

            .form-group label {
                font-size: 0.9rem;
                margin-bottom: 0.4rem;
            }

            .form-group input {
                padding: 0.6rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 768px) {
            .payment-section {
                padding: 1rem 0.75rem;
            }

            .payment-card {
                padding: 1.25rem;
                max-width: 100%;
                border-radius: 6px;
            }

            .radio-group {
                gap: 0.75rem;
            }

            .radio-group label {
                padding: 8px 10px;
                font-size: 0.85rem;
                min-width: 48%;
            }

            .radio-group input[type="radio"] {
                width: 16px;
                height: 16px;
                margin-right: 6px;
            }

            .form-group {
                margin-bottom: 0.8rem;
            }

            .form-group label {
                font-size: 0.85rem;
                margin-bottom: 0.35rem;
            }

            .form-group input {
                padding: 0.55rem;
                font-size: 0.8rem;
            }

            .account-details {
                font-size: 0.85rem;
                padding: 0.6rem 0.8rem;
            }

            .qr-code-box img {
                max-width: 150px;
            }

            #gcash-details {
                padding: 0.75rem;
                margin-top: 0.75rem;
            }

            #gcash-details p {
                font-size: 0.85rem;
                margin: 0.6rem 0;
            }
        }

        @media (max-width: 600px) {
            .payment-section {
                padding: 0.75rem;
            }

            .payment-card {
                padding: 1rem;
                margin: 0.5rem auto;
            }

            .radio-group {
                gap: 0.5rem;
            }

            .radio-group label {
                padding: 7px 9px;
                font-size: 0.8rem;
                min-width: 45%;
            }

            .radio-group input[type="radio"] {
                width: 15px;
                height: 15px;
                margin-right: 5px;
            }

            .form-group {
                margin-bottom: 0.7rem;
            }

            .form-group label {
                font-size: 0.8rem;
                margin-bottom: 0.3rem;
            }

            .form-group input {
                padding: 0.5rem;
                font-size: 0.75rem;
            }

            .account-details {
                font-size: 0.8rem;
                padding: 0.5rem 0.7rem;
            }

            .qr-code-box {
                margin: 0.75rem 0;
            }

            .qr-code-box img {
                max-width: 120px;
                border-width: 1px;
            }

            #gcash-details {
                padding: 0.65rem;
                margin-top: 0.6rem;
                border-radius: 0.4rem;
            }

            #gcash-details p {
                font-size: 0.8rem;
                margin: 0.4rem 0;
            }

            .proceed-button-1 {
                padding: 0.65rem 1.5rem;
                font-size: 0.85rem;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .order-navbar {
                padding: 0.5rem 0.75rem;
            }

            .back-btn {
                padding: 0.3rem;
            }

            .arrow {
                font-size: 0.95rem;
            }

            .main-title {
                font-size: 0.95rem;
            }

            .sub-title {
                font-size: 0.65rem;
            }

            .payment-section {
                padding: 0.5rem;
            }

            .payment-card {
                padding: 0.75rem;
                max-width: 100%;
            }

            .radio-group {
                gap: 0.4rem;
                flex-direction: column;
            }

            .radio-group label {
                padding: 6px 8px;
                font-size: 0.75rem;
                min-width: 100%;
                justify-content: flex-start;
            }

            .radio-group input[type="radio"] {
                width: 14px;
                height: 14px;
                margin-right: 4px;
                margin-top: 2px;
            }

            .form-group {
                margin-bottom: 0.6rem;
            }

            .form-group label {
                font-size: 0.75rem;
                margin-bottom: 0.25rem;
                font-weight: bold;
            }

            .form-group input {
                padding: 0.45rem;
                font-size: 0.7rem;
                border-radius: 0.3rem;
            }

            .account-details {
                font-size: 0.75rem;
                padding: 0.4rem 0.6rem;
                display: block;
                word-wrap: break-word;
            }

            .qr-code-box {
                text-align: center;
                margin: 0.6rem 0;
            }

            .qr-code-box img {
                max-width: 100px;
                border-radius: 0.4rem;
                border-width: 1px;
            }

            #gcash-details {
                padding: 0.6rem;
                margin-top: 0.5rem;
                border-radius: 0.3rem;
                background-color: #f5f5f5;
            }

            #gcash-details p {
                font-size: 0.75rem;
                margin: 0.3rem 0;
                color: #555;
            }

            #gcash-details hr {
                margin: 0.8rem 0;
                border: none;
                border-top: 1px solid #ddd;
            }

            .proceed-button-1 {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
                width: 100%;
                border-radius: 0.4rem;
            }

            .proceed {
                letter-spacing: 0.5px;
            }
        }
    </style>
</head>
<body>

    <header class="order-navbar">
        
       <a href="mug-details.html" class="back-btn">
        <span class="arrow">&larr;</span>
       </a>

        <div class="header-text">
            <h1 class="main-title"> Payment Section</h1>
            <p class="sub-title">UPRESSease - WMSU </p>
        </div>
    </header>

   <section class="payment-section">
    <div class="payment-card">
        
        <form action="success.html" method="POST" enctype="multipart/form-data">
            
            <div class="form-group text-left" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <label style="font-size: 16px; margin-bottom: 10px;">Select Payment Method:</label>

                <div class="radio-group" style="margin-bottom: 20px;">
                    <input type="radio" id="pay-gcash" name="payment_method" value="GCash" checked>
                    <label for="pay-gcash" style="font-weight: normal; cursor: pointer;">GCash</label>
                     <input type="radio" id="pay-cash" name="payment_method" value="Cash">
                    <label for="pay-cash" style="font-weight: normal; cursor: pointer; text-indent: 10px;">Cash on Pick-up</label>
                </div>

            <div id="gcash-details">
                <p><em>If Cash on pick-up, skip this part.<br></em></p>
                <p>Please scan the QR code below or send your total amount to:</p>
                <p class="account-details"><strong>UPRESSease | 0912 345 6789</strong></p>

                <div class="qr-code-box">
                    <img src="gcash-qr.jpg" alt="GCash QR Code" width="200">
                </div>

                <hr style="border: 1px solid #eee; margin: 20px 0;">
                
                <div class="form-group text-left">
                    <label>GCash Reference Number:</label>
                    <input type="text" id="ref-number" name="ref_number" placeholder="e.g., 1001 234 567 890">
                </div>

                <div class="form-group text-left">
                    <label>Upload Proof of Payment:</label>
                    <input type="file" id="payment-proof" name="payment_proof" accept="image/*">
                </div>
            </div> 
            
            <div style="display:flex; justify-content: center; width: 100%; margin: 30px 0;">
                <a href="success.html" class="proceed-button-1">
                    <span class="proceed">PROCEED</span>
                </a>
            </div>

        </form>

    </div>
</section>

<script>
    // Handle payment method toggle
    const paymentRadios = document.querySelectorAll('input[name="payment_method"]');
    const gcashDetails = document.getElementById('gcash-details');

    function togglePaymentMethod() {
        const selectedMethod = document.querySelector('input[name="payment_method"]:checked').value;
        
        if (selectedMethod === 'Cash') {
            gcashDetails.classList.add('hidden');
        } else {
            gcashDetails.classList.remove('hidden');
        }
    }

    // Add event listeners to both radio buttons
    paymentRadios.forEach(radio => {
        radio.addEventListener('change', togglePaymentMethod);
    });
</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Section</title>
    <link rel="stylesheet" href="MAIN.css">
    <link rel="stylesheet" href="mug.css">
</head>
<body>

    <header class="order-navbar">
        
       <a href="customize-mug.html" class="back-btn">
        <span class="arrow">&larr;</span>
       </a>

        <div class="header-text">
            <h1 class="main-title"> Payment Section</h1>
            <p class="sub-title">UPRESSease - WMSU </p>
        </div>
    </header>

   <section class="payment-section">
    <div class="payment-card">
        <div id="transaction-summary" style="background:#fff1c8;border:1px solid #eedf9f;padding:12px;margin-bottom:16px;border-radius:8px;">
            <h3>Transaction Summary</h3>
            <ul id="transaction-items" style="margin:0;padding-left:20px; color:#333;"></ul>
            <p>Total amount: <strong id="transaction-total">₱0.00</strong></p>
        </div>
        <form id="payment-form" action="success.html" method="POST" enctype="multipart/form-data" onsubmit="return validatePayment()">
            
            <div class="form-group text-left" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <label style="font-size: 16px; margin-bottom: 10px;">Name:</label>
                <input type="text" name="payer_name" id="payer_name" required>
            </div>

            <div class="form-group text-left" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <label style="font-size: 16px; margin-bottom: 10px;">Delivery Date:</label>
                <input type="date" name="delivery_date" id="delivery_date" required>
            </div>

            <div class="form-group text-left" style="margin-bottom:20px;">
                <p>Registered phone number: <strong id="registered-phone">09123456789</strong></p>
                <p>Use this number?</p>
                <label><input type="radio" name="use_registered" value="yes" checked onchange="toggleCustomPhone(false)"> Yes</label>
                <label><input type="radio" name="use_registered" value="no" onchange="toggleCustomPhone(true)"> No</label>
            </div>

            <div id="custom-phone-block" style="display:none;">
                <div class="form-group text-left">
                    <label>New Phone Number:</label>
                    <input type="tel" id="new_phone" name="new_phone" pattern="09[0-9]{9}">
                </div>
                <div class="form-group text-left" style="display:flex; align-items:center; gap:8px;">
                    <button type="button" onclick="sendPhoneOtp()" style="padding:6px 10px;">Send OTP</button>
                    <input type="text" id="phone_otp" placeholder="Enter OTP" style="max-width:140px;" disabled>
                    <button type="button" onclick="verifyPhoneOtp()" style="padding:6px 10px;">Verify</button>
                    <span id="phone-otp-status" style="font-size:0.9rem;color:#d43434;"></span>
                </div>
            </div>

            <div style="display:flex; justify-content: center; width: 100%; margin: 30px 0;">
                <button type="submit" class="proceed-button-1" style="cursor:pointer;"><span class="proceed">PROCEED</span></button>
            </div>

        </form>

    </div>
</section>

<script>
    let customPhoneVerified = false;
    let phoneOtpCode = null;

    function toggleCustomPhone(show) {
        const block = document.getElementById('custom-phone-block');
        block.style.display = show ? 'block' : 'none';
        customPhoneVerified = !show;
    }

    function sendPhoneOtp() {
        const phone = document.getElementById('new_phone').value.trim();
        if (!phone) {
            alert('Enter a new phone number first');
            return;
        }
        phoneOtpCode = '654321';
        document.getElementById('phone_otp').disabled = false;
        document.getElementById('phone-otp-status').textContent = 'OTP sent (demo: 654321)';
        customPhoneVerified = false;
    }

    function verifyPhoneOtp() {
        if (document.getElementById('phone_otp').value.trim() === phoneOtpCode) {
            document.getElementById('phone-otp-status').textContent = 'Verified';
            document.getElementById('phone-otp-status').style.color = 'green';
            customPhoneVerified = true;
        } else {
            document.getElementById('phone-otp-status').textContent = 'Invalid OTP';
            document.getElementById('phone-otp-status').style.color = '#d43434';
            customPhoneVerified = false;
        }
    }

    function validatePayment() {
        const useRegistered = document.querySelector('input[name="use_registered"]:checked').value;
        if (useRegistered === 'no' && !customPhoneVerified) {
            alert('Please verify the new phone number to proceed.');
            return false;
        }
        return true;
    }

    window.addEventListener('DOMContentLoaded', function() {
        const savedPhone = localStorage.getItem('signed_phone');
        if (savedPhone) {
            document.getElementById('registered-phone').textContent = savedPhone;
        }

        const pending = localStorage.getItem('pending_transaction');
        const itemsEl = document.getElementById('transaction-items');
        const totalEl = document.getElementById('transaction-total');
        if (pending) {
            const items = JSON.parse(pending);
            let total = 0;
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item.service + ' - ₱' + Number(item.amount).toFixed(2);
                itemsEl.appendChild(li);
                total += Number(item.amount);
            });
            totalEl.textContent = '₱' + total.toFixed(2);
        } else {
            itemsEl.innerHTML = '<li>No services added. Please add services first in My Orders.</li>';
            totalEl.textContent = '₱0.00';
        }
    });
</script>

</body>
</html>
